name: Deploy

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      # environment:
      #   description: 'Environment to deploy to'
      #   required: true
      #   default: 'production'
      #   type: choice
      #   options:
      #     - production
      #     - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy from SSH (git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git checkout main
            git pull origin main
